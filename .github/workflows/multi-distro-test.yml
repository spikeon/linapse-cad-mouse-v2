name: Multi-Distro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: jrei/systemd-ubuntu:latest
          - distro: debian
            image: jrei/systemd-debian:12
          - distro: fedora
            image: jrei/systemd-fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start systemd container
        run: |
          docker run -d --name systemd-container \
            --cgroupns=host \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --privileged \
            -v ${{ github.workspace }}:/workspace \
            ${{ matrix.image }}

      - name: Wait for systemd boot
        run: |
          sleep 5
          docker exec systemd-container systemctl is-system-running || true
          docker exec systemd-container systemctl start dbus || true

      - name: Enable linger for root user
        run: |
          docker exec systemd-container loginctl enable-linger root
          sleep 2

      - name: Install base dependencies (Ubuntu/Debian)
        if: matrix.distro == 'ubuntu' || matrix.distro == 'debian'
        run: |
          docker exec systemd-container sh -c "apt-get update && apt-get install -y sudo python3 python3-pip python3-venv git curl udev dbus"

      - name: Install base dependencies (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker exec systemd-container sh -c "dnf install -y sudo python3 python3-pip git curl udev dbus-daemon"

      - name: Install Python dependencies
        run: |
          docker exec systemd-container sh -c "python3 -m pip install pytest websockets pyserial --break-system-packages || python3 -m pip install pytest websockets pyserial || pip3 install pytest websockets pyserial"

      - name: Run setup.sh
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus \
            systemd-container sh -c "cd /workspace && ./setup.sh --yes"

      - name: Run pytest suite inside container
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus \
            systemd-container sh -c "cd /workspace && pytest linux/"

      - name: Save job status
        if: always()
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/${{ matrix.distro }}

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.distro }}
          path: results/${{ matrix.distro }}

  update-badges:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all statuses
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: status-*
          merge-multiple: true

      - name: Show results directory
        run: ls -la results/

      - name: Run badge updater script
        run: python3 linux/update_badges.py results/

      - name: Check for changes in README.md
        id: git-check
        run: |
          git status
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update distro badges in README [skip ci]"
          git push

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest

      - name: Run tests on Windows
        run: |
          pytest linux/

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets linux/linapse-service

      - name: Update AppVersion in installer.iss
        shell: powershell
        run: |
          $version = (Get-Content VERSION).Trim()
          (Get-Content installer.iss) -replace 'AppVersion=.*', "AppVersion=$version" | Set-Content installer.iss

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          iscc installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinapseServiceSetup
          path: LinapseServiceSetup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest

      - name: Run tests on macOS
        run: |
          pytest linux/

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets linux/linapse-service

      - name: Prepare launchd agent payload directory structures
        run: |
          mkdir -p payload/usr/local/bin
          mkdir -p payload/Library/LaunchAgents
          cp dist/linapse-service payload/usr/local/bin/linapse-service
          cat << 'EOF' > payload/Library/LaunchAgents/com.linapse.service.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.linapse.service</string>
              <key>ProgramArguments</key>
              <array>
                  <string>/usr/local/bin/linapse-service</string>
              </array>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build macOS Package
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          pkgbuild --root payload --identifier com.linapse.cadmouse --version "$VERSION" --install-location / linapse-service.pkg

      - name: Upload macOS Package
        uses: actions/upload-artifact@v4
        with:
          name: linapse-service-pkg
          path: linapse-service.pkg


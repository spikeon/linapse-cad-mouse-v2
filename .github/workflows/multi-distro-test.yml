name: Multi-Distro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: jrei/systemd-ubuntu:24.04
          - distro: debian
            image: jrei/systemd-debian:12
          - distro: fedora
            image: jrei/systemd-fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start systemd container
        run: |
          docker run -d --name systemd-container \
            --cgroupns=host \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --privileged \
            -v ${{ github.workspace }}:/workspace \
            ${{ matrix.image }}

      - name: Wait for systemd boot
        run: |
          sleep 5
          docker exec systemd-container systemctl is-system-running || true
          docker exec systemd-container systemctl start dbus || true

      - name: Enable linger for root user
        run: |
          docker exec systemd-container loginctl enable-linger root
          sleep 2

      - name: Install base dependencies (Ubuntu/Debian)
        if: matrix.distro == 'ubuntu' || matrix.distro == 'debian'
        run: |
          docker exec systemd-container sh -c "apt-get update && apt-get install -y sudo python3 python3-pip python3-venv git curl udev dbus"

      - name: Install base dependencies (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker exec systemd-container sh -c "dnf install -y sudo python3 python3-pip git curl udev dbus-daemon"

      - name: Install Python dependencies
        run: |
          docker exec systemd-container sh -c "python3 -m pip install pytest websockets pyserial pyyaml fastapi 'uvicorn[standard]' numpy scipy playwright --break-system-packages || python3 -m pip install pytest websockets pyserial pyyaml fastapi 'uvicorn[standard]' numpy scipy playwright || pip3 install pytest websockets pyserial pyyaml fastapi 'uvicorn[standard]' numpy scipy playwright"

      - name: Install Playwright Browsers
        run: |
          if [ "${{ matrix.distro }}" = "fedora" ]; then
            # Install system dependencies manually on Fedora
            docker exec systemd-container sh -c "dnf install -y libicu libjpeg-turbo libwebp flite pcre libffi mesa-libgbm libdrm xorg-x11-server-Xvfb atk at-spi2-atk libXcomposite libXdamage libXrandr libXtst cups-libs libxcb libXScrnSaver alsa-lib pango cairo nss gtk3 libnotify liberation-fonts wqy-zenhei-fonts liberation-sans-fonts liberation-serif-fonts"
            docker exec systemd-container sh -c "python3 -m playwright install chromium"
          else
            # Install with dependencies on Ubuntu/Debian
            docker exec systemd-container sh -c "python3 -m playwright install --with-deps chromium"
          fi

      - name: Sync version strings from VERSION file
        run: python3 scripts/sync_version.py

      - name: Run setup.sh
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus \
            systemd-container sh -c "cd /workspace && ./setup.sh --yes"

      - name: Run pytest suite inside container
        id: run_tests
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus -e LINAPSE_SKIP_BROWSER_BRIDGE=1 \
            systemd-container sh -c "cd /workspace && systemctl --user stop linapse-service linapse-configurator ydotoold 2>/dev/null || true; pytest service/ --junitxml=pytest_${{ matrix.distro }}_results.xml --tb=short > pytest_${{ matrix.distro }}_output.log 2>&1; status=\$?; cat pytest_${{ matrix.distro }}_output.log; chmod 666 pytest_${{ matrix.distro }}_results.xml pytest_${{ matrix.distro }}_output.log || true; exit \$status"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (${{ matrix.distro }})
          path: pytest_${{ matrix.distro }}_results.xml
          reporter: java-junit

      - name: Upload Linux test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.distro }}-log
          path: pytest_${{ matrix.distro }}_output.log

      - name: Save job status
        if: always()
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/${{ matrix.distro }}

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.distro }}
          path: results/${{ matrix.distro }}

  update-badges:
    needs: [test, build-windows, build-macos, build-browser-extension]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all statuses
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: status-*
          merge-multiple: true

      - name: Download all test logs on failure
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: pytest-*-log
          path: results/logs
          merge-multiple: true

      - name: Copy test failure logs if present
        run: |
          if [ -d results/logs ]; then
            mkdir -p ci_logs
            cp results/logs/*_output.log ci_logs/ || true
          fi

      - name: Show results directory
        run: ls -la results/

      - name: Run badge updater script
        run: python3 service/update_badges.py results/

      - name: Check for changes
        id: git-check
        run: |
          git status
          git add README.md ci_logs/ || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update distro badges and commit CI logs [skip ci]"
          git push

  build-windows:
    runs-on: windows-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest playwright pyyaml pycaw fastapi "uvicorn[standard]" numpy scipy

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Sync version strings from VERSION file
        run: python3 scripts/sync_version.py

      - name: Run tests on Windows
        id: run_tests
        shell: bash
        env:
          LINAPSE_SKIP_BROWSER_BRIDGE: "1"
        run: |
          pytest service/ --junitxml=pytest_windows_results.xml --tb=short 2>&1 | tee pytest_windows_output.log
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (Windows)
          path: pytest_windows_results.xml
          reporter: java-junit

      - name: Upload Windows test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-windows-log
          path: pytest_windows_output.log

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --noconsole --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets --hidden-import=pycaw service/linapse-service

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Electron Configurator (Windows)
        run: |
          cd configurator
          npm install
          npm run pack
          cd ..
        shell: bash

      - name: Build browser extension (Windows artifact)
        run: |
          cd extension
          npm install
          npm run build
          cd ..

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          iscc installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinapseServiceSetup
          path: LinapseServiceSetup.exe

      - name: Save job status
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/windows

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-windows
          path: results/windows

  build-macos:
    runs-on: macos-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest playwright pyyaml fastapi "uvicorn[standard]" numpy scipy

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Sync version strings from VERSION file
        run: python3 scripts/sync_version.py

      - name: Run tests on macOS
        id: run_tests
        env:
          LINAPSE_SKIP_BROWSER_BRIDGE: "1"
        run: |
          pytest service/ --junitxml=pytest_macos_results.xml

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (macOS)
          path: pytest_macos_results.xml
          reporter: java-junit

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets service/linapse-service

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Electron Configurator (macOS)
        run: |
          cd configurator
          npm install
          npm run pack
          cd ..

      - name: Prepare launchd agent payload directory structures
        run: |
          mkdir -p payload/usr/local/bin
          mkdir -p payload/Library/LaunchAgents
          mkdir -p payload/Applications
          cp dist/linapse-service payload/usr/local/bin/linapse-service
          if [ -d "configurator/dist/mac-arm64" ]; then
            cp -R "configurator/dist/mac-arm64/Linapse Configurator.app" payload/Applications/
          else
            cp -R "configurator/dist/mac/Linapse Configurator.app" payload/Applications/
          fi
          cat << 'EOF' > payload/Library/LaunchAgents/com.linapse.service.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.linapse.service</string>
              <key>ProgramArguments</key>
              <array>
                  <string>/usr/local/bin/linapse-service</string>
              </array>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build macOS Package
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          pkgbuild --root payload --identifier com.linapse.cadmouse --version "$VERSION" --install-location / linapse-service.pkg

      - name: Upload macOS Package
        uses: actions/upload-artifact@v4
        with:
          name: linapse-service-pkg
          path: linapse-service.pkg

      - name: Save job status
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/macos

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-macos
          path: results/macos

  build-browser-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version strings from VERSION file
        run: python3 scripts/sync_version.py

      - name: Build browser extension packages
        run: |
          cd extension
          npm install
          npm run build

      - name: Upload browser extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linapse-browser-extension
          path: |
            extension/dist/*.zip
            extension/dist/chrome/**

      - name: Save job status
        if: always()
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/browser-extension

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-browser-extension
          path: results/browser-extension

  publish-browser-extension:
    needs: [build-browser-extension, test]
    runs-on: ubuntu-latest
    if: >-
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.event_name == 'push' &&
      vars.CHROME_STORE_PUBLISH_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download browser extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: linapse-browser-extension
          path: extension/dist

      - name: Install extension publish dependencies
        run: |
          cd extension
          npm install

      - name: Publish to Chrome Web Store
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          if [ -z "$CHROME_CLIENT_ID" ] || [ -z "$CHROME_CLIENT_SECRET" ] || [ -z "$CHROME_REFRESH_TOKEN" ]; then
            echo "Chrome Web Store secrets are not configured."
            echo "See docs/BROWSER_EXTENSION.md for setup instructions."
            exit 0
          fi
          cd extension
          npm run publish:chrome

      - name: Save publish job status
        if: always()
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/browser-extension-publish

      - name: Upload publish status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-browser-extension-publish
          path: results/browser-extension-publish

  release:
    needs: [test, build-windows, build-macos, build-browser-extension]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: LinapseServiceSetup
          path: .

      - name: Download macOS Package
        uses: actions/download-artifact@v4
        with:
          name: linapse-service-pkg
          path: .

      - name: Download browser extension packages
        uses: actions/download-artifact@v4
        with:
          name: linapse-browser-extension
          path: extension-release

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            LinapseServiceSetup.exe
            linapse-service.pkg
            extension-release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-aur:
    needs: [test]
    runs-on: ubuntu-latest
    # DISABLED UNTIL ACCOUNT REGISTERED
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/linapse-cad-mouse.git aur-repo
          cp aur/PKGBUILD aur-repo/
          cp aur/.SRCINFO aur-repo/
          cp aur/linapse-configurator aur-repo/
          cp aur/linapse-configurator.desktop aur-repo/
          cd aur-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO linapse-configurator linapse-configurator.desktop
          git commit -m "Release version $(cat ../VERSION)"
          git push

  release-ubuntu-ppa:
    needs: [release]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push' && vars.UBUNTU_PPA_PUBLISH_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dput gnupg dh-python

      - name: Prepare Debian source package and upload
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PPA_OWNER: ${{ vars.PPA_OWNER }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$PPA_OWNER" ]; then
            echo "Launchpad GPG key or PPA owner secret/var not configured. Skipping PPA release."
            exit 0
          fi
          
          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          
          # Configure dput
          cat << EOF > ~/.dput.cf
          [linapse-ppa]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~${PPA_OWNER}/ubuntu/linapse-cad-mouse/
          login = anonymous
          allow_unsigned_uploads = 0
          EOF

          # Build and upload source package for supported Ubuntu releases
          for dist in noble jammy; do
            # Clean up previous builds
            rm -f ../linapse-cad-mouse_*
            
            # Update changelog for target distribution
            sed -i "1s/unstable/${dist}/" debian/changelog
            
            # Create orig source tarball
            tar -czf ../linapse-cad-mouse_${VERSION}.orig.tar.gz --exclude=.git --exclude=debian .
            
            # Build source package (ignore missing build dependencies on CI runner, exclude VCS files)
            debuild -S -sa -d -i -I
            
            # Upload
            dput linapse-ppa ../linapse-cad-mouse_${VERSION}*_source.changes
            
            # Reset changelog
            git checkout debian/changelog
          done

  release-fedora-copr:
    needs: [release]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push' && vars.FEDORA_COPR_PUBLISH_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install COPR CLI
        run: pip install copr-cli rich

      - name: Trigger COPR build
        env:
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_PROJECT: ${{ vars.COPR_PROJECT }}
        run: |
          if [ -z "$COPR_USERNAME" ] || [ -z "$COPR_LOGIN" ] || [ -z "$COPR_TOKEN" ] || [ -z "$COPR_PROJECT" ]; then
            echo "COPR API secrets/vars not configured. Skipping COPR release."
            exit 0
          fi
          
          mkdir -p ~/.config
          cat << EOF > ~/.config/copr
          [copr-cli]
          username = ${COPR_USERNAME}
          login = ${COPR_LOGIN}
          token = ${COPR_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          
          # Trigger COPR build from GitHub SCM repository
          copr-cli buildscm ${COPR_PROJECT} \
            --clone-url https://github.com/spikeon/linapse-cad-mouse-v2.git \
            --commit v${VERSION} \
            --spec fedora/linapse-cad-mouse.spec




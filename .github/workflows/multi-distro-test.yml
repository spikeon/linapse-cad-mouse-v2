name: Multi-Distro CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: jrei/systemd-ubuntu:latest
          - distro: debian
            image: jrei/systemd-debian:12
          - distro: fedora
            image: jrei/systemd-fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start systemd container
        run: |
          docker run -d --name systemd-container \
            --cgroupns=host \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --privileged \
            -v ${{ github.workspace }}:/workspace \
            ${{ matrix.image }}

      - name: Wait for systemd boot
        run: |
          sleep 5
          docker exec systemd-container systemctl is-system-running || true
          docker exec systemd-container systemctl start dbus || true

      - name: Enable linger for root user
        run: |
          docker exec systemd-container loginctl enable-linger root
          sleep 2

      - name: Install base dependencies (Ubuntu/Debian)
        if: matrix.distro == 'ubuntu' || matrix.distro == 'debian'
        run: |
          docker exec systemd-container sh -c "apt-get update && apt-get install -y sudo python3 python3-pip python3-venv git curl udev dbus"

      - name: Install base dependencies (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          docker exec systemd-container sh -c "dnf install -y sudo python3 python3-pip git curl udev dbus-daemon"

      - name: Install Python dependencies
        run: |
          docker exec systemd-container sh -c "python3 -m pip install pytest websockets pyserial pyyaml --break-system-packages || python3 -m pip install pytest websockets pyserial pyyaml || pip3 install pytest websockets pyserial pyyaml"

      - name: Run setup.sh
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus \
            systemd-container sh -c "cd /workspace && ./setup.sh --yes"

      - name: Run pytest suite inside container
        id: run_tests
        run: |
          docker exec -e XDG_RUNTIME_DIR=/run/user/0 -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/0/bus \
            systemd-container sh -c "cd /workspace && pytest service/ --junitxml=pytest_${{ matrix.distro }}_results.xml --tb=short > pytest_${{ matrix.distro }}_output.log 2>&1; status=\$?; cat pytest_${{ matrix.distro }}_output.log; chmod 666 pytest_${{ matrix.distro }}_results.xml pytest_${{ matrix.distro }}_output.log || true; exit \$status"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (${{ matrix.distro }})
          path: pytest_${{ matrix.distro }}_results.xml
          reporter: java-junit

      - name: Upload Linux test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.distro }}-log
          path: pytest_${{ matrix.distro }}_output.log

      - name: Save job status
        if: always()
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/${{ matrix.distro }}

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.distro }}
          path: results/${{ matrix.distro }}

  update-badges:
    needs: [test, build-windows, build-macos]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all statuses
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: status-*
          merge-multiple: true

      - name: Download all test logs on failure
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: pytest-*-log
          path: results/logs
          merge-multiple: true

      - name: Copy test failure logs if present
        run: |
          if [ -d results/logs ]; then
            mkdir -p ci_logs
            cp results/logs/*_output.log ci_logs/ || true
          fi

      - name: Show results directory
        run: ls -la results/

      - name: Run badge updater script
        run: python3 service/update_badges.py results/

      - name: Check for changes
        id: git-check
        run: |
          git status
          git add README.md ci_logs/ || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update distro badges and commit CI logs [skip ci]"
          git push

  build-windows:
    runs-on: windows-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest playwright pyyaml pycaw

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run tests on Windows
        id: run_tests
        shell: bash
        run: |
          pytest service/ --junitxml=pytest_windows_results.xml --tb=short 2>&1 | tee pytest_windows_output.log

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (Windows)
          path: pytest_windows_results.xml
          reporter: java-junit

      - name: Upload Windows test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-windows-log
          path: pytest_windows_output.log

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets --hidden-import=pycaw service/linapse-service

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Electron Configurator (Windows)
        run: |
          cd configurator
          npm install
          npm run pack
          cd ..
        shell: bash

      - name: Update AppVersion in installer.iss
        shell: powershell
        run: |
          $version = (Get-Content VERSION).Trim()
          (Get-Content installer.iss) -replace 'AppVersion=.*', "AppVersion=$version" | Set-Content installer.iss

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          iscc installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinapseServiceSetup
          path: LinapseServiceSetup.exe

      - name: Save job status
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/windows

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-windows
          path: results/windows

  build-macos:
    runs-on: macos-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller websockets pyserial pynput hidapi pytest playwright pyyaml

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run tests on macOS
        id: run_tests
        run: |
          pytest service/ --junitxml=pytest_macos_results.xml

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.run_tests.outcome != 'skipped'
        with:
          name: Pytest Results (macOS)
          path: pytest_macos_results.xml
          reporter: java-junit

      - name: Compile linapse-service
        run: |
          pyinstaller --onefile --name linapse-service --hidden-import=pynput --hidden-import=hid --hidden-import=websockets service/linapse-service

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Electron Configurator (macOS)
        run: |
          cd configurator
          npm install
          npm run pack
          cd ..

      - name: Prepare launchd agent payload directory structures
        run: |
          mkdir -p payload/usr/local/bin
          mkdir -p payload/Library/LaunchAgents
          mkdir -p payload/Applications
          cp dist/linapse-service payload/usr/local/bin/linapse-service
          cp -R "configurator/dist/mac/Linapse Configurator.app" payload/Applications/
          cat << 'EOF' > payload/Library/LaunchAgents/com.linapse.service.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.linapse.service</string>
              <key>ProgramArguments</key>
              <array>
                  <string>/usr/local/bin/linapse-service</string>
              </array>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build macOS Package
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          pkgbuild --root payload --identifier com.linapse.cadmouse --version "$VERSION" --install-location / linapse-service.pkg

      - name: Upload macOS Package
        uses: actions/upload-artifact@v4
        with:
          name: linapse-service-pkg
          path: linapse-service.pkg

      - name: Save job status
        if: always()
        shell: bash
        run: |
          mkdir -p results
          echo "${{ job.status }}" > results/macos

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-macos
          path: results/macos

  release:
    needs: [test, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: LinapseServiceSetup
          path: .

      - name: Download macOS Package
        uses: actions/download-artifact@v4
        with:
          name: linapse-service-pkg
          path: .

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            LinapseServiceSetup.exe
            linapse-service.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


